name: Sync main to deploy branch

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push main to claude branch
        run: |
          git push origin main:claude/pastry-shop-multilingual-f5ejsp --force
